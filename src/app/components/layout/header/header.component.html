<header *ngIf="!loggedIn" class="header-login">
  <img src="/img/logo3.png" alt="HRMS logo" class="header-logo-login" />
  <div class="header-content-login">
    <h1>HRMS</h1>
    <p>Manage your human resources efficiently</p>
  </div>
</header>

<header *ngIf="loggedIn" class="header-dashboard">
  <div class="header-left-dashboard">
    <div class="logo-circle">
      <img src="/img/logo3.png" alt="HRMS" class="header-logo-dashboard" />
    </div>
    <span class="header-title">HRMS</span>
  </div>

  <div class="header-menu-dashboard">
    <button [class]="activeSection === 'employee' ? 'menu-item active' : 'menu-item'"
      (click)="onSectionClick('employee')" type="button">
      Employees
    </button>
    <button [class]="activeSection === 'directory' ? 'menu-item active' : 'menu-item'"
      (click)="onSectionClick('directory')" type="button">
      Directory
    </button>
    <button [class]="activeSection === 'leave' ? 'menu-item active' : 'menu-item'" (click)="onSectionClick('leave')"
      type="button">
      Leave
    </button>
    <button [class]="activeSection === 'attendance' ? 'menu-item active' : 'menu-item'"
      (click)="onSectionClick('attendance')" type="button">
      Attendance
    </button>
  </div>

  <div class="header-right-dashboard">
    <button type="button" class="notification-btn" title="Notifications">
      <span class="bell-icon">🔔</span>
    </button>

    <div *ngIf="user" class="user-profile">
      <div class="user-avatar">👤</div>
      <div class="user-meta">
        <div class="user-name">{{ user.name || 'ram pote' }}</div>
        <div class="user-role">HR MANAGER</div>
      </div>
    </div>

    <button type="button" class="logout-btn" (click)="onLogout()">
      Logout
    </button>
  </div>
</header>
