<div class="page-header">
  <h2>Register New Employee</h2>
</div>

<div class="form-container-card">
  <form (ngSubmit)="handleSubmit()" class="employee-form">

    <!-- Basic Info -->
    <div class="form-group">
      <label class="form-label">First Name</label>
      <input class="form-input" [(ngModel)]="formData.firstName" name="firstName" (input)="handleChange('firstName')" required />
      <div *ngIf="errors['firstName']" class="form-error">{{ errors['firstName'] }}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Last Name</label>
      <input class="form-input" [(ngModel)]="formData.lastName" name="lastName" (input)="handleChange('lastName')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" [(ngModel)]="formData.email" name="email" (input)="handleChange('email')" required />
      <div *ngIf="errors['email']" class="form-error">{{ errors['email'] }}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input class="form-input" [(ngModel)]="formData.phone" name="phone" (input)="handleChange('phone')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Date of Joining</label>
      <input class="form-input" type="date" [(ngModel)]="formData.dateOfJoining" name="dateOfJoining" (input)="handleChange('dateOfJoining')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Date of Birth</label>
      <input class="form-input" type="date" [(ngModel)]="formData.dateOfBirth" name="dateOfBirth" (input)="handleChange('dateOfBirth')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Position</label>
      <input class="form-input" [(ngModel)]="formData.position" name="position" (input)="handleChange('position')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Department</label>
      <input class="form-input" [(ngModel)]="formData.department" name="department" (input)="handleChange('department')" required />
    </div>

    <!-- Residential -->
    <h3>Residential Address</h3>
    <div class="form-group">
      <label class="form-label">Address Line 1</label>
      <input class="form-input" [(ngModel)]="formData.resAddressLine1" name="resAddressLine1" (input)="handleChange('resAddressLine1')" required />
    </div>
    <div class="form-group">
      <label class="form-label">Address Line 2</label>
      <input class="form-input" [(ngModel)]="formData.resAddressLine2" name="resAddressLine2" (input)="handleChange('resAddressLine2')" />
    </div>
    <div class="form-group">
      <label class="form-label">PIN Code</label>
      <input class="form-input" [(ngModel)]="formData.resPinCode" name="resPinCode" (input)="handleChange('resPinCode')" maxlength="6" required />
    </div>
    <div class="form-group">
      <label class="form-label">State</label>
      <select class="form-select" [(ngModel)]="formData.resState" name="resState" (change)="handleChange('resState')" required>
        <option value="" disabled>Select State</option>
        <option *ngFor="let state of STATES" [value]="state">{{ state }}</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Country</label>
      <select class="form-select" [(ngModel)]="formData.resCountry" name="resCountry" (change)="handleChange('resCountry')" required>
        <option value="" disabled>Select Country</option>
        <option *ngFor="let country of COUNTRIES" [value]="country">{{ country }}</option>
      </select>
    </div>

    <!-- Permanent -->
    <h3>Permanent Address</h3>

    <div style="display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px;">
      <input type="checkbox" [ngModel]="sameAsResidential" (ngModelChange)="handleCheckbox($event)" name="sameAsResidential" style="margin: 0; width: 14px; height: 14px; cursor: pointer;" />
      <label style="margin: 0; cursor: pointer;">Same as Residential Address</label>
    </div>

    <div class="form-group">
      <label class="form-label">Address Line 1</label>
      <input class="form-input" [(ngModel)]="formData.permAddressLine1" name="permAddressLine1" [disabled]="sameAsResidential" required />
    </div>
    <div class="form-group">
      <label class="form-label">Address Line 2</label>
      <input class="form-input" [(ngModel)]="formData.permAddressLine2" name="permAddressLine2" [disabled]="sameAsResidential" />
    </div>
    <div class="form-group">
      <label class="form-label">PIN Code</label>
      <input class="form-input" [(ngModel)]="formData.permPinCode" name="permPinCode" maxlength="6" [disabled]="sameAsResidential" required />
    </div>
    <div class="form-group">
      <label class="form-label">State</label>
      <select class="form-select" [(ngModel)]="formData.permState" name="permState" [disabled]="sameAsResidential" required>
        <option value="" disabled>Select State</option>
        <option *ngFor="let state of STATES" [value]="state">{{ state }}</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Country</label>
      <select class="form-select" [(ngModel)]="formData.permCountry" name="permCountry" [disabled]="sameAsResidential" required>
        <option value="" disabled>Select Country</option>
        <option *ngFor="let country of COUNTRIES" [value]="country">{{ country }}</option>
      </select>
    </div>

    <div class="form-actions" style="margin-top: 2rem;">
      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register Employee' }}
      </button>
    </div>

  </form>
</div>
