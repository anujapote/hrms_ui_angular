<div class="page-header">
  <h2>Pending Leave Requests</h2>
  <p class="page-subtitle">Review and approve pending leave requests</p>
</div>

<div class="form-container-card">
  <h3>Request New Leave</h3>
  <form (ngSubmit)="handleSubmit()" class="leave-form mt-4">
    <div class="form-group">
      <label class="form-label">Employee</label>
      <select class="form-select" [(ngModel)]="formData.employeeId" name="employeeId" (change)="handleChange('employeeId')" required>
        <option value="" disabled>Select Employee</option>
        <option *ngFor="let emp of employees" [value]="emp.id">{{ emp.name }}</option>
      </select>
      <div *ngIf="errors['employeeId']" class="form-error">{{ errors['employeeId'] }}</div>
    </div>

    <div class="form-group">
      <label class="form-label">Leave Type</label>
      <select class="form-select" [(ngModel)]="formData.type" name="type" (change)="handleChange('type')">
        <option *ngFor="let type of LEAVE_TYPES" [value]="type">{{ type }}</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Number of Days</label>
      <input class="form-input" type="number" min="1" [(ngModel)]="formData.days" name="days" (input)="handleChange('days')" required />
    </div>

    <div class="form-actions mt-4">
      <button type="submit" class="btn btn-primary">Request Leave</button>
    </div>
  </form>
</div>

<div class="table-section mt-8">
  <h3>Pending Requests ({{ pendingLeaves.length }})</h3>
  <div class="table-wrapper mt-4">
    <table class="table">
      <thead>
        <tr>
          <th>Employee</th>
          <th>Type</th>
          <th>Days</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let req of pendingLeaves">
          <td>{{ req.employeeName }}</td>
          <td>{{ req.type }}</td>
          <td>{{ $any(req).days }}</td>
          <td>
            <div class="action-buttons" style="display: flex; gap: 8px;">
              <button class="btn btn-sm btn-success" (click)="handleApprove(req.id)">Approve</button>
              <button class="btn btn-sm btn-danger" (click)="handleReject(req.id)">Reject</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="pendingLeaves.length === 0">
          <td colspan="4" style="text-align: center; padding: 2rem; color: #6b7280;">No pending leave requests.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
